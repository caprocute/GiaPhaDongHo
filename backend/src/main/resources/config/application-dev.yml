# ===================================================================
# Spring Boot configuration for the "dev" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# https://docs.spring.io/spring-boot/appendix/application-properties/index.html
# ===================================================================

logging:
  level:
    ROOT: DEBUG
    tech.jhipster: DEBUG
    org.hibernate.SQL: DEBUG
    vn.giapha: DEBUG

spring:
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson2:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    # Tunnel DEV: localhost:15432 — ghi đè bằng SPRING_DATASOURCE_URL / DB_*
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/giapha}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:giapha}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    hikari:
      poolName: Hikari
      auto-commit: false
  liquibase:
    # Remove 'faker' if you do not want the sample data to be loaded automatically
    contexts: dev, faker
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false
  docker:
    compose:
      enabled: false
  security:
    oauth2:
      client:
        provider:
          oidc:
            issuer-uri: ${KC_ISSUER_URI:http://localhost:18086/realms/jhipster}
        registration:
          oidc:
            client-id: ${OAUTH2_CLIENT_ID:web_app}
            client-secret: ${OAUTH2_CLIENT_SECRET:web_app}
      resourceserver:
        jwt:
          issuer-uri: ${KC_ISSUER_URI:http://localhost:18086/realms/jhipster}

server:
  port: 8080
  # make sure requests the proxy uri instead of the server one
  forward-headers-strategy: native

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  # CORS is only enabled by default with the "dev" profile
  cors:
    # Portal :3000 · Admin :5173 · Ionic :8100
    allowed-origins: 'http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8100,https://localhost:8100'
    # Enable CORS when running in GitHub Codespaces
    allowed-origin-patterns: 'https://*.githubpreview.dev'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: true
    max-age: 1800
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

giapha:
  search:
    elasticsearch-url: ${ES_URL:http://localhost:19200}
  minio:
    # Tunnel DEV: localhost:19000 — ghi đè bằng MINIO_*
    endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
    access-key: ${MINIO_ACCESS_KEY:giapha}
    secret-key: ${MINIO_SECRET_KEY:changeme}
    bucket: ${MINIO_BUCKET:giapha-media}
  imgproxy:
    base-url: ${IMGPROXY_BASE_URL:http://localhost:8888}
    signing-enabled: ${IMGPROXY_SIGNING_ENABLED:false}
