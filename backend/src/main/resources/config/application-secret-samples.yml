# ===================================================================
# Spring Boot configuration for the "secret-samples" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Samples for required secrets to be used in development and ci using prod profile.
# ===================================================================

spring:
  datasource:
    username: giapha
    password:
  security:
    oauth2:
      client:
        provider:
          oidc:
            issuer-uri: http://localhost:9080/realms/jhipster
        registration:
          oidc:
            client-id: web_app
            client-secret: web_app
            scope: openid, profile, email, offline_access # last one for refresh tokens

giapha:
  minio:
    # Prod: giá trị thật phải qua Jasypt ENC(...)
    # Sinh bằng: jasypt-cli encrypt input=<giá trị> password=$JASYPT_ENCRYPTOR_PASSWORD
    endpoint: ENC(REPLACE_ME)
    access-key: ENC(REPLACE_ME)
    secret-key: ENC(REPLACE_ME)
  imgproxy:
    base-url: ENC(REPLACE_ME)
    key: ENC(REPLACE_ME)
    salt: ENC(REPLACE_ME)
    signing-enabled: true

jhipster:
