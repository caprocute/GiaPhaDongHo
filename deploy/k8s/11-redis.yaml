# Redis 7 — cache / rate-limit. Không cần bền vững (allkeys-lru).
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: giapha
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: giapha
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 5
