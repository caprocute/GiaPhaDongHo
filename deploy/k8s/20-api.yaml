# API — Spring Boot (JHipster). Chạy Liquibase migration lúc khởi động.
# Image build từ backend/Dockerfile (xem INSTALL.md để build & push, hoặc dùng GHCR).
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: giapha
  labels: { app: api }
spec:
  selector: { app: api }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: giapha
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata:
      labels: { app: api }
    spec:
      # Chờ Postgres + Keycloak sẵn sàng trước khi start (tránh crashloop lúc migrate).
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting pg; sleep 3; done"]
      containers:
        - name: api
          image: ghcr.io/caprocute/giaphadongho/api:main
          envFrom:
            - configMapRef: { name: giapha-config }
            - secretRef: { name: giapha-secret }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /management/health/readiness, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /management/health/liveness, port: 8080 }
            initialDelaySeconds: 120
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "768Mi" }
            limits: { memory: "1536Mi" }
