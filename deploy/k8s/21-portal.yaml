# Portal — Next.js (công khai, cho khách xem gia phả). Cổng 3000.
# ⚠ NEXT_PUBLIC_* nhúng lúc BUILD image (build-arg), không đổi được lúc chạy —
#   phải build image với URL public đúng (xem INSTALL.md).
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: giapha
  labels: { app: portal }
spec:
  selector: { app: portal }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: giapha
spec:
  replicas: 1
  selector: { matchLabels: { app: portal } }
  template:
    metadata:
      labels: { app: portal }
    spec:
      containers:
        - name: portal
          image: ghcr.io/caprocute/giaphadongho/portal:main
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
