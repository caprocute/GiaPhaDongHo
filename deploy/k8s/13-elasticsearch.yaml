# Elasticsearch 8 — full-text search (single-node dev). Tắt security cho DEV.
# Để trống ES_URL trong app => fallback PG FTS (unaccent). Cụm này là tuỳ chọn.
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: giapha
  labels: { app: elasticsearch }
spec:
  selector: { app: elasticsearch }
  ports:
    - { name: http, port: 9200, targetPort: 9200 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: giapha
spec:
  serviceName: elasticsearch
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      initContainers:
        # ES cần vm.max_map_count cao — chỉnh trên node (cần privileged).
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          securityContext: { privileged: true }
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
            - { name: cluster.name, value: giapha }
          ports:
            - containerPort: 9200
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
          readinessProbe:
            httpGet:
              path: "/_cluster/health?wait_for_status=yellow&timeout=1s"
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
