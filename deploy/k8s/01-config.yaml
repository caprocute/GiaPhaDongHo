# ConfigMap (giá trị không nhạy cảm) + Secret (mật khẩu).
# ⚠ Đây là secret DEMO base64 placeholder — KHÔNG dùng cho prod.
#    Prod: tạo Secret bằng `kubectl create secret` / SealedSecrets / External Secrets,
#    và mã hoá cấu hình nhạy cảm bằng Jasypt (ENC(...)) như luật dự án.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: giapha-config
  namespace: giapha
data:
  DB_NAME: "giapha"
  DB_USER: "giapha"
  # DNS nội bộ cluster: <service>.<namespace>.svc.cluster.local (rút gọn được trong cùng ns).
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/giapha"
  SPRING_DATASOURCE_USERNAME: "giapha"
  ES_URL: "http://elasticsearch:9200"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "giapha-media"
  IMGPROXY_BASE_URL: "http://imgproxy:8080"
  IMGPROXY_SIGNING_ENABLED: "false"
  KC_ISSUER_URI: "http://keycloak:8081/realms/jhipster"
  SPRING_PROFILES_ACTIVE: "prod"
  # URL public cho FE build-time (đổi theo domain thật khi có Ingress).
  APP_API_PUBLIC_URL: "http://localhost:8080"
  KC_PUBLIC_ISSUER_URI: "http://localhost:8081/realms/jhipster"
  DEFAULT_TREE_SLUG: "ho-hoang"
---
apiVersion: v1
kind: Secret
metadata:
  name: giapha-secret
  namespace: giapha
type: Opaque
stringData:
  # stringData: Kubernetes tự base64. Đổi hết trước khi dùng thật.
  DB_PASSWORD: "changeme-strong-db"
  SPRING_DATASOURCE_PASSWORD: "changeme-strong-db"
  MINIO_ACCESS_KEY: "giapha"
  MINIO_SECRET_KEY: "changeme-strong-minio"
  KC_ADMIN: "admin"
  KC_ADMIN_PASSWORD: "changeme-strong-kc"
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "changeme-strong-kc"
  JASYPT_ENCRYPTOR_PASSWORD: "changeme-jasypt-master"
