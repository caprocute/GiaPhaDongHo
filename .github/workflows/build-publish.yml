name: Build & Publish
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Image namespace (lowercase)
        run: echo "NS=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.NS }}/api:${{ github.ref_name }}
            ${{ env.NS }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [portal, admin]
    steps:
      - uses: actions/checkout@v4
      - name: Image namespace (lowercase)
        run: echo "NS=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.NS }}/${{ matrix.app }}:${{ github.ref_name }}
            ${{ env.NS }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # FE nhúng URL LÚC BUILD — đổi domain phải build lại image, không sửa được lúc chạy.
          # Ưu tiên biến PROD_*; chưa cấu hình thì lùi về biến cũ (staging).
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.PROD_API_URL || vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_TREE_SLUG=ho-hoang
            VITE_API_BASE_URL=${{ vars.PROD_API_URL || vars.VITE_API_BASE_URL }}
            VITE_OIDC_AUTHORITY=${{ vars.PROD_KC_ISSUER || vars.VITE_OIDC_AUTHORITY }}
            VITE_OIDC_CLIENT_ID=giapha_admin
            VITE_DEFAULT_TREE_SLUG=ho-hoang
