<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GiaPhaHub · Quản trị</title>
    <script>
      (function () {
        try {
          var k = "giapha.appearance";
          var r = document.documentElement;
          var d = { palette: "bang-vang", mode: "system" };
          try {
            var raw = localStorage.getItem(k);
            if (raw) {
              var p = JSON.parse(raw);
              if (p && (p.palette === "bang-vang" || p.palette === "co")) d.palette = p.palette;
              if (p && (p.mode === "light" || p.mode === "dark" || p.mode === "system")) d.mode = p.mode;
            }
          } catch (e) {}
          var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = d.mode === "dark" || (d.mode === "system" && dark) ? "dark" : "light";
          r.setAttribute("data-palette", d.palette);
          r.setAttribute("data-mode", resolved);
          r.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Noto+Serif:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
